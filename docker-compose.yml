services:
  # ============================================
  # Infrastructure Services
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: vision-redis
    hostname: vision-redis
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    # Security: Redis should NOT be exposed to host - only accessible within Docker network
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - vision_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G

  dependency-checker:
    image: curlimages/curl:latest
    container_name: vision-dependency-checker
    hostname: vision-dependency-checker
    command: sh -c "while true; do sleep 10; done"
    networks:
      - vision_network
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - |
          curl -f http://frame-server:5001/frames/health &&
          curl -f http://scenes-service:5002/scenes/health &&
          curl -f http://faces-service:5003/faces/health &&
          curl -f http://semantics-service:5004/semantics/health &&
          curl -f http://resource-manager:5007/resources/health
      interval: 5s
      timeout: 10s
      retries: 1
      start_period: 600s # 10 minutes for model loading

  # ============================================
  # Core Processing Services
  # ============================================

  frame-server:
    build:
      context: ./frame-server
      dockerfile: ${FRAME_SERVER_DOCKERFILE:-Dockerfile}
    container_name: vision-frame-server
    hostname: vision-frame-server
    runtime: ${DOCKER_RUNTIME:-nvidia}
    ports:
      - "${FRAME_SERVER_PORT:-5001}:5001"
    environment:
      - EXTRACTION_METHOD=${FRAME_EXTRACTION_METHOD:-opencv_cuda}
      - OPENCV_DEVICE=${OPENCV_DEVICE:-cuda}
      - REDIS_URL=redis://vision-redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - FRAME_TTL_HOURS=${FRAME_TTL_HOURS:-2}
      - ENABLE_FALLBACK=${ENABLE_FALLBACK:-true}
      - ENABLE_ENHANCEMENT=${ENABLE_ENHANCEMENT:-false}
      - ENHANCEMENT_MODEL=${ENHANCEMENT_MODEL:-gfpgan}
      - MAX_ENHANCEMENT_PIXELS=${MAX_ENHANCEMENT_PIXELS:-2073600}
    volumes:
      - ${TEST_MEDIA_PATH}:/media/videos:ro
      - ${SERVER_MEDIA_PATH}:/data:ro
      - ./frame-server/app:/app/app
      - frames_cache:/tmp/frames
      - sprites_cache:/tmp/sprites
      - downloads_cache:/tmp/downloads
      - torch_cache:/root/.cache/torch
      - enhancement_models:/tmp/face_enhancement_models
      - codeformer_weights:/usr/local/lib/python3.10/site-packages/codeformer/weights
    networks:
      - vision_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/frames/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 120s # Allow time for enhancement models to load
    deploy:
      resources:
        limits:
          memory: 20G

  scenes-service:
    build:
      context: ./scenes-service
      dockerfile: ${SCENES_DOCKERFILE:-Dockerfile}
    container_name: vision-scenes-service
    hostname: vision-scenes-service
    runtime: ${DOCKER_RUNTIME:-nvidia}
    ports:
      - "${SCENES_PORT:-5002}:5002"
    environment:
      - DETECTOR=${SCENES_DETECTOR:-pyscenedetect_cuda}
      - OPENCV_DEVICE=${OPENCV_DEVICE:-cuda}
      - REDIS_URL=redis://vision-redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - SCENES_THRESHOLD=${SCENES_THRESHOLD:-27.0}
      - MAX_ENHANCEMENT_PIXELS=${MAX_ENHANCEMENT_PIXELS:-2073600}
    volumes:
      - ${TEST_MEDIA_PATH}:/media/videos:ro
      - ${SERVER_MEDIA_PATH}:/data:ro
      - ./scenes-service/app:/app/app
      - downloads_cache:/tmp/downloads
    networks:
      - vision_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/scenes/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 12G

  faces-service:
    build:
      context: ./faces-service
      dockerfile: ${FACES_DOCKERFILE:-Dockerfile}
    container_name: vision-faces-service
    hostname: vision-faces-service
    runtime: ${DOCKER_RUNTIME:-nvidia}
    security_opt:
      - seccomp:unconfined
    ports:
      - "${FACES_PORT:-5003}:5003"
    environment:
      - INSIGHTFACE_MODEL=${INSIGHTFACE_MODEL:-buffalo_l}
      - INSIGHTFACE_DEVICE=${INSIGHTFACE_DEVICE:-cuda}
      - INSIGHTFACE_COMPUTE_TYPE=${INSIGHTFACE_COMPUTE_TYPE:-float16}
      - FRAME_SERVER_URL=http://frame-server:5001
      - REDIS_URL=redis://vision-redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - FACES_MIN_CONFIDENCE=${FACES_MIN_CONFIDENCE:-0.9}
      - FACES_MIN_QUALITY=${FACES_MIN_QUALITY:-0.0}
      - FACES_ENHANCEMENT_QUALITY_TRIGGER=${FACES_ENHANCEMENT_QUALITY_TRIGGER:-0.5}
      - MAX_ENHANCEMENT_PIXELS=${MAX_ENHANCEMENT_PIXELS:-2073600}
    volumes:
      - ${TEST_MEDIA_PATH}:/media/videos:ro
      - ${SERVER_MEDIA_PATH}:/data:ro
      - ./faces-service/app:/app/app
      - ./faces-service/models:/app/models
      - frames_cache:/tmp/frames
      - sprites_cache:/tmp/sprites
      - downloads_cache:/tmp/downloads
      - insightface_models:/root/.insightface
    networks:
      - vision_network
    depends_on:
      redis:
        condition: service_healthy
      frame-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/faces/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s # 10 minutes for model download
    deploy:
      resources:
        limits:
          memory: 20G

  semantics-service:
    build:
      context: ./semantics-service
      dockerfile: ${SEMANTICS_DOCKERFILE:-Dockerfile}
    container_name: vision-semantics-service
    hostname: vision-semantics-service
    runtime: ${DOCKER_RUNTIME:-nvidia}
    ports:
      - "${SEMANTICS_PORT:-5004}:5004"
    environment:
      - CLASSIFIER_MODEL=${CLASSIFIER_MODEL:-text-only}
      - CLASSIFIER_DEVICE=${CLASSIFIER_DEVICE:-cuda}
      - SEMANTICS_HF_REPO=${SEMANTICS_HF_REPO:-smegmarip/tag-classifier}
      - SEMANTICS_HF_VISION_MODEL=${SEMANTICS_HF_VISION_MODEL:-vision/best_model.pt}
      - SEMANTICS_HF_TEXT_MODEL=${SEMANTICS_HF_TEXT_MODEL:-text-only/best_model.pt}
      - SEMANTICS_HF_VISION_TAG_MAPPING=${SEMANTICS_HF_VISION_TAG_MAPPING:-vision/tag_mapping.json}
      - SEMANTICS_HF_TEXT_TAG_MAPPING=${SEMANTICS_HF_TEXT_TAG_MAPPING:-text-only/tag_mapping.json}
      - SCENES_SERVICE_URL=http://scenes-service:5002
      - FRAME_SERVER_URL=http://frame-server:5001
      - RESOURCE_MANAGER_URL=http://resource-manager:5007
      - STASH_URL=${STASH_URL:-http://host.docker.internal:9999}
      - STASH_API_KEY=${STASH_API_KEY:-}
      - SEMANTICS_TAG_ID=${SEMANTICS_TAG_ID:-}
      - LLM_API_BASE=${LLM_API_BASE:-http://host.docker.internal:8000/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      - REDIS_URL=redis://vision-redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - SEMANTICS_MIN_CONFIDENCE=${SEMANTICS_MIN_CONFIDENCE:-0.75}
    volumes:
      - ${TEST_MEDIA_PATH}:/media/videos:ro
      - ${SERVER_MEDIA_PATH}:/data:ro
      - ./semantics-service/app:/app/app
      - ./semantics-service/models:/app/models
      - frames_cache:/tmp/frames
      - sprites_cache:/tmp/sprites
      - downloads_cache:/tmp/downloads
      - huggingface_cache:/root/.cache/huggingface
      - torch_cache_2:/root/.cache/torch
    networks:
      - vision_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      scenes-service:
        condition: service_started
      frame-server:
        condition: service_started
      resource-manager:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/semantics/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 24G

  objects-service:
    build:
      context: ./objects-service
      dockerfile: ${OBJECTS_DOCKERFILE:-Dockerfile}
    container_name: vision-objects-service
    hostname: vision-objects-service
    runtime: ${DOCKER_RUNTIME:-nvidia}
    ports:
      - "${OBJECTS_PORT:-5005}:5005"
    environment:
      - YOLO_MODEL=${YOLO_MODEL:-yolo-world-m}
      - YOLO_DEVICE=${YOLO_DEVICE:-cuda}
      - FRAME_SERVER_URL=http://frame-server:5001
      - REDIS_URL=redis://vision-redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - STUB_MODE=${OBJECTS_STUB_MODE:-true} # Phase 1: return not_implemented
      - OBJECTS_MIN_CONFIDENCE=${OBJECTS_MIN_CONFIDENCE:-0.5}
      - MAX_ENHANCEMENT_PIXELS=${MAX_ENHANCEMENT_PIXELS:-2073600}
    volumes:
      - ${TEST_MEDIA_PATH}:/media/videos:ro
      - ${SERVER_MEDIA_PATH}:/data:ro
      - ./objects-service/app:/app/app
      - ./objects-service/models:/app/models
    networks:
      - vision_network
    depends_on:
      redis:
        condition: service_healthy
      frame-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/objects/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 16G

  resource-manager:
    build:
      context: ./resource-manager
      dockerfile: ${RESOURCE_MANAGER_DOCKERFILE:-Dockerfile}
    container_name: vision-resource-manager
    hostname: vision-resource-manager
    runtime: ${DOCKER_RUNTIME:-nvidia}
    ports:
      - "${RESOURCE_MANAGER_PORT:-5007}:5007"
    environment:
      - TOTAL_VRAM_MB=${TOTAL_VRAM_MB:-16384}
      - LEASE_DURATION_SECONDS=${LEASE_DURATION_SECONDS:-600}
      - HEARTBEAT_TIMEOUT_SECONDS=${HEARTBEAT_TIMEOUT_SECONDS:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./resource-manager/app:/app/app
    networks:
      - vision_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/resources/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # Main API / Orchestrator
  # ============================================

  vision-api:
    build:
      context: ./vision-api
      dockerfile: Dockerfile
    container_name: vision-api
    hostname: vision-api
    ports:
      - "${VISION_API_PORT:-5010}:5010"
    environment:
      - FRAME_SERVER_URL=http://frame-server:5001
      - SCENES_SERVICE_URL=http://scenes-service:5002
      - FACES_SERVICE_URL=http://faces-service:5003
      - SEMANTICS_SERVICE_URL=http://semantics-service:5004
      - OBJECTS_SERVICE_URL=http://objects-service:5005
      - RESOURCE_MANAGER_URL=http://resource-manager:5007
      - REDIS_URL=redis://vision-redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PROCESSING_MODE=${PROCESSING_MODE:-sequential}
      - SCENES_THRESHOLD=${SCENES_THRESHOLD:-27.0}
      - FACES_MIN_CONFIDENCE=${FACES_MIN_CONFIDENCE:-0.9}
      - SEMANTICS_MIN_CONFIDENCE=${SEMANTICS_MIN_CONFIDENCE:-0.5}
      - OBJECTS_MIN_CONFIDENCE=${OBJECTS_MIN_CONFIDENCE:-0.5}
      - CAPTIONS_MIN_CONFIDENCE=${CAPTIONS_MIN_CONFIDENCE:-0.5}
    volumes:
      - ${TEST_MEDIA_PATH}:/media/videos:ro
      - ${SERVER_MEDIA_PATH}:/data:ro
      - ./vision-api/app:/app/app
      - downloads_cache:/tmp/downloads
    networks:
      - vision_network
    depends_on:
      dependency-checker:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/vision/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 8G

  # ============================================
  # UI Services
  # ============================================

  jobs-viewer:
    build:
      context: ./jobs-viewer
      dockerfile: Dockerfile
    container_name: vision-jobs-viewer
    hostname: vision-jobs-viewer
    ports:
      - "${JOBS_VIEWER_PORT:-5020}:5020"
    environment:
      - VISION_API_URL=http://vision-api:5010
      - FRAME_SERVER_URL=http://frame-server:5001
      - SCENES_SERVICE_URL=http://scenes-service:5002
      - FACES_SERVICE_URL=http://faces-service:5003
      - SEMANTICS_SERVICE_URL=http://semantics-service:5004
      - OBJECTS_SERVICE_URL=http://objects-service:5005
      - RESOURCE_MANAGER_URL=http://resource-manager:5007
      - REDIS_URL=redis://vision-redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - vision_network
    depends_on:
      vision-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5020/viewer/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # Schema Service
  # ============================================

  schema-service:
    build:
      context: ./schema-service
      dockerfile: Dockerfile
    container_name: vision-schema-service
    hostname: vision-schema-service
    ports:
      - "${SCHEMA_PORT:-5009}:5009"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./schema-service/app:/app/app
      - ./schema-service/config.yaml:/config/config.yaml
      - ./schema-service/template.yaml:/config/template.yaml
    networks:
      - vision_network
    depends_on:
      frame-server:
        condition: service_started
      scenes-service:
        condition: service_started
      faces-service:
        condition: service_started
      semantics-service:
        condition: service_started
      objects-service:
        condition: service_started
      resource-manager:
        condition: service_started
      vision-api:
        condition: service_started
      jobs-viewer:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5009/schema/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ============================================
# Networks
# ============================================

networks:
  vision_network:
    name: ${DOCKER_NETWORK:-stash-auto-vision-network}
    external: true

# ============================================
# Volumes
# ============================================

volumes:
  redis_data:
  frames_cache:
  sprites_cache:
  downloads_cache:
  torch_cache:
  torch_cache_2:
  enhancement_models:
  codeformer_weights:
  insightface_models:
  huggingface_cache:
