name: "Auto Vision Captioning"
description: "Automatic scene captioning and tagging using JoyCaption VLM"
version: "1.0.0"
url: "https://github.com/your-repo/stash-auto-vision"

exec:
  - python
  - "{pluginDir}/autovision.py"

interface: raw

# Task definitions
tasks:
  - name: "Caption Scene"
    description: "Run VLM captioning on a scene and apply tags"
    execArgs:
      - task
      - caption_scene

  - name: "Caption Selected"
    description: "Caption all selected scenes"
    execArgs:
      - task
      - caption_selected

  - name: "Sync Taxonomy"
    description: "Sync tag taxonomy to captioning service"
    execArgs:
      - task
      - sync_taxonomy

# Hook definitions
hooks:
  - name: "Auto-caption on scan"
    description: "Automatically caption new scenes after scanning"
    triggeredBy:
      - Scene.Create.Post
    execArgs:
      - hook
      - scene_created

settings:
  - name: api_url
    displayName: "Captioning Service URL"
    description: "URL of the stash-auto-vision captioning service"
    type: STRING
    default: "http://localhost:5006"

  - name: prompt_type
    displayName: "Prompt Type"
    description: "Type of prompt for VLM captioning"
    type: ENUM
    default: "scene_summary"
    enumOptions:
      - "descriptive"
      - "descriptive_informal"
      - "straightforward"
      - "booru_like"
      - "booru_like_extended"
      - "art_critic"
      - "training_prompt"
      - "scene_summary"

  - name: min_confidence
    displayName: "Minimum Confidence"
    description: "Minimum confidence threshold for tag alignment (0.0-1.0)"
    type: NUMBER
    default: 0.5

  - name: auto_caption_enabled
    displayName: "Auto-Caption New Scenes"
    description: "Automatically caption scenes when they are created"
    type: BOOLEAN
    default: false

  - name: apply_tags
    displayName: "Apply Tags to Scenes"
    description: "Automatically apply matched tags to scenes"
    type: BOOLEAN
    default: true

  - name: max_tags_per_scene
    displayName: "Max Tags Per Scene"
    description: "Maximum number of tags to apply per scene"
    type: NUMBER
    default: 20

  - name: use_hierarchical_scoring
    displayName: "Use Hierarchical Scoring"
    description: "Use DFS hierarchical tag scoring for better accuracy"
    type: BOOLEAN
    default: true

  - name: use_sprite_sheets
    displayName: "Use Sprite Sheets"
    description: "Use existing sprite sheets for faster frame extraction"
    type: BOOLEAN
    default: true
